name: ci

# Root CI. GitHub Actions only reads workflows from the repository root
# `.github/workflows/`, so this is what actually runs on PRs and pushes to main.
# Each job is path-filtered so it only runs when its part of the monorepo
# changes. The per-app workflows under `apps/*/.github/workflows/` are kept for
# reference but do NOT execute from a subdirectory.
#
# The android/ios jobs deliberately go beyond "does it build": they LAUNCH the
# app on an emulator/simulator, because a green build hid real launch crashes in
# the native migration (Android: missing @AndroidEntryPoint; iOS: missing
# FirebaseApp.configure()). Build-only CI would not have caught either.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      engine: ${{ steps.filter.outputs.engine }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'packages/core/**'
              - '.github/workflows/ci.yml'
            android:
              - 'apps/android/**'
              - '.github/workflows/ci.yml'
            ios:
              - 'apps/ios/**'
              - '.github/workflows/ci.yml'
            engine:
              - 'packages/core/**'
              - '.github/workflows/ci.yml'

  api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/api/go.sum
      - name: Test
        run: make test
      - name: Build
        run: make build

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  android:
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Build + unit tests + lint
        working-directory: apps/android
        run: ./gradlew --no-daemon assembleDebug testDebugUnitTest lintDebug
      # Instrumented tests run the app through Hilt on a real emulator, so they
      # catch crash-on-launch (e.g. a missing @AndroidEntryPoint) that build +
      # unit tests cannot.
      - name: Enable KVM (emulator acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Instrumented tests (emulator launch)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          working-directory: apps/android
          script: ./gradlew --no-daemon connectedDebugAndroidTest

  ios:
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' }}
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/ios
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      # Build for the SIMULATOR (not `swift build`, which only compiles the
      # macOS host and skips the #if canImport(UIKit) code where the GoogleSignIn
      # bug lived). `generic/platform=iOS Simulator` needs no specific device.
      - name: Build for simulator
        run: |
          set -x
          xcodebuild -project SchedulerApp.xcodeproj -scheme SchedulerApp \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build
      - name: Boot a pre-existing simulator
        id: sim
        run: |
          set -x
          UDID=$(xcrun simctl list devices available | grep -i 'iPhone' | grep -oE '[0-9A-Fa-f-]{36}' | head -1)
          echo "Using simulator $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
      - name: Unit tests on simulator
        run: |
          xcodebuild -project SchedulerApp.xcodeproj -scheme SchedulerApp \
            -sdk iphonesimulator -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO test
      # Launch smoke: install + launch + assert the process is alive. Catches
      # crash-on-launch such as a missing FirebaseApp.configure().
      - name: Launch smoke
        env:
          UDID: ${{ steps.sim.outputs.udid }}
        run: |
          APP=$(find build/Build/Products -name 'SchedulerApp.app' -path '*iphonesimulator*' | head -1)
          xcrun simctl install "$UDID" "$APP"
          xcrun simctl launch "$UDID" com.schedulersystems.scheduler
          sleep 8
          if ! xcrun simctl spawn "$UDID" launchctl list | grep -q schedulersystems; then
            echo "::error::iOS app is not running after launch (crashed)"; exit 1
          fi
          echo "iOS app launched and is running"

  engine:
    needs: changes
    if: ${{ needs.changes.outputs.engine == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Engine tests
        run: node --test

  # Aggregator gate. Always runs so the org-level `gate` required status check
  # is satisfied for every PR/push, even when the path-filtered jobs are
  # legitimately skipped. Fails only if a job that actually ran failed or was
  # cancelled (skipped == OK).
  gate:
    needs: [changes, api, web, android, ios, engine]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require ran jobs to have succeeded
        run: |
          for pair in "changes:${{ needs.changes.result }}" "api:${{ needs.api.result }}" "web:${{ needs.web.result }}" "android:${{ needs.android.result }}" "ios:${{ needs.ios.result }}" "engine:${{ needs.engine.result }}"; do
            job="${pair%%:*}"; res="${pair#*:}"
            echo "$job -> $res"
            if [ "$res" = "failure" ] || [ "$res" = "cancelled" ]; then
              echo "::error::required job '$job' did not pass (result=$res)"
              exit 1
            fi
          done
          echo "gate: all jobs passed or were skipped"
