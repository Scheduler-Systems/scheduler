name: ci

# Root CI. GitHub Actions only reads workflows from the repository root
# `.github/workflows/`, so this is what actually runs on PRs and pushes to main.
# Each job is path-filtered so it only runs when its part of the monorepo
# changes. The per-app workflows under `apps/*/.github/workflows/` are kept for
# reference but do NOT execute from a subdirectory.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'packages/core/**'
              - '.github/workflows/ci.yml'

  api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/api/go.sum
      - name: Test
        run: make test
      - name: Build
        run: make build

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  # Aggregator gate. Always runs so the org-level `gate` required status check
  # is satisfied for every PR/push, even when the path-filtered api/web jobs are
  # legitimately skipped. Fails only if a job that actually ran failed or was
  # cancelled (skipped == OK).
  gate:
    needs: [changes, api, web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require ran jobs to have succeeded
        run: |
          for pair in "changes:${{ needs.changes.result }}" "api:${{ needs.api.result }}" "web:${{ needs.web.result }}"; do
            job="${pair%%:*}"; res="${pair#*:}"
            echo "$job -> $res"
            if [ "$res" = "failure" ] || [ "$res" = "cancelled" ]; then
              echo "::error::required job '$job' did not pass (result=$res)"
              exit 1
            fi
          done
          echo "gate: all jobs passed or were skipped"
