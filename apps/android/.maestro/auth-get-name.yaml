# Maestro GUI e2e for the Android auth-get-name page (Flutter→native consolidation).
# login → Home → "Complete Profile" → enter name → Continue (PUT /users/{uid}) → choose-role.
appId: com.schedulersystems.scheduler
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 45000
- tapOn: "Email"
- inputText: "qa-verified@example.com"
- tapOn:
    text: "Password"
    index: 0
- inputText: "Password123!"
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "My Schedules"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Complete Profile"
    direction: DOWN
    timeout: 15000
- tapOn: "Complete Profile"
- extendedWaitUntil:
    visible: "What's your name?"
    timeout: 15000
- tapOn:
    text: "Your name"
- inputText: "QA Tester"
- hideKeyboard
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Choose Your Role"                          # get-name persisted, advanced to choose-role
    timeout: 15000
- takeScreenshot: 01-get-name
