# Maestro GUI e2e for the Android new-schedule-create page (Flutter→native consolidation).
# login → Home → "Create New Schedule" → enter a UNIQUE name → Create → schedule
# persists via the Go API (POST /schedules) and appears in My Schedules.
# Unique name per run because the API 409s on duplicate schedule names; seed.sh prunes "E2E ..." leftovers.
appId: com.schedulersystems.scheduler
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 25000
- tapOn: "Email"
- inputText: "qa-verified@example.com"
- tapOn:
    text: "Password"
    index: 0
- inputText: "Password123!"
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "Create New Schedule"
    timeout: 15000
- evalScript: ${output.sched = 'E2E And ' + Math.floor(Math.random() * 1000000)}
- tapOn: "Create New Schedule"
- extendedWaitUntil:
    visible: "Schedule Name"
    timeout: 15000
- tapOn: "Schedule Name"
- inputText: ${output.sched}
- hideKeyboard
- tapOn: "Create Schedule"
- extendedWaitUntil:
    visible: "My Schedules"
    timeout: 15000
- extendedWaitUntil:
    visible: "QA Demo Schedule"                       # wait for the list's async load before scrolling
    timeout: 15000
- scrollUntilVisible:
    element:
      text: ${output.sched}
    timeout: 15000
- takeScreenshot: 01-new-schedule-create
