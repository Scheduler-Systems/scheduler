# Maestro GUI e2e for the Android password-reset page (Flutter→native consolidation, page 1).
# Runs zero-account against the Firebase Auth emulator (build with -PuseFirebaseEmulator=true).
#   maestro test apps/android/.maestro/password-reset.yaml
appId: com.schedulersystems.scheduler
---
- launchApp:
    clearState: true
- assertVisible: "Welcome Back"          # login screen rendered
- takeScreenshot: 01-login
- tapOn: "Forgot Password?"
- assertVisible: "Reset Password"        # navigated to the (previously stub) reset screen
- takeScreenshot: 02-reset-screen
- tapOn: "Email"
- inputText: "qa-e2e@example.com"
- hideKeyboard
- tapOn: "Send Reset Email"
- assertVisible: "Check your email for the reset link"   # success state from real VM→repo→emulator
- takeScreenshot: 03-reset-success
