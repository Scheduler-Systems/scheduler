# Maestro GUI e2e for the Android first-time walkthrough (Flutterâ†’native consolidation).
# A `forceWalkthrough` launch extra makes Home show the one-time "first time here" welcome overlay
# (the gate is otherwise HIDDEN in the emulator build, so the existing logged-in flows are
# unaffected). login â†’ Home â†’ "Welcome!" overlay â†’ "Got it" persists the seen-flag â†’ Home content.
appId: com.schedulersystems.scheduler
---
- launchApp:
    clearState: true
    arguments:
      forceWalkthrough: true
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 45000
- tapOn: "Email"
- inputText: "qa-verified@example.com"
- tapOn:
    text: "Password"
    index: 0
- inputText: "Password123!"
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "Welcome!"                           # the first-time walkthrough overlay on Home
    timeout: 20000
- tapOn: "Got it"                                 # persists the seen-flag â†’ dismiss
- extendedWaitUntil:
    visible: "My Schedules"                       # walkthrough gone â†’ real Home content
    timeout: 15000
- takeScreenshot: 01-walkthrough-dismissed
