name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build and Release to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app
          xcodebuild -version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: fastlane

      - name: Install Fastlane
        run: bundle install
        working-directory: fastlane

      - name: Decode Match SSH Key
        env:
          MATCH_SSH_KEY_BASE64: ${{ secrets.MATCH_SSH_KEY_BASE64 }}
        run: |
          mkdir -p ~/.ssh
          echo "$MATCH_SSH_KEY_BASE64" | base64 --decode > ~/.ssh/match_key
          chmod 600 ~/.ssh/match_key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/match_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Decode App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          echo "APP_STORE_CONNECT_API_KEY=$(echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode)" >> $GITHUB_ENV

      - name: Build and Upload to TestFlight
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
          SPACESHIP_ONLY_2FA: 'true'
        run: |
          bundle exec fastlane release
        working-directory: fastlane

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            fastlane/build/*.ipa
            fastlane/build/*.dSYM.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            fastlane/build
            fastlane/logs
          retention-days: 14

  notify:
    name: Notify Release Status
    needs: build-and-release
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify Success
        if: needs.build-and-release.result == 'success'
        run: |
          echo "✅ Release ${{ github.ref_name }} deployed to TestFlight successfully!"

      - name: Notify Failure
        if: needs.build-and-release.result == 'failure'
        run: |
          echo "❌ Release ${{ github.ref_name }} failed. Check the workflow logs."
          exit 1
