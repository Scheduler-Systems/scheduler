# Maestro GUI e2e for the iOS password-reset page (Flutter→native consolidation, page 1).
# Zero-account against the Firebase Auth emulator; iOS Simulator reaches the host at 127.0.0.1.
# The `useFirebaseEmulator` launch arg flips Auth.auth().useEmulator(host:127.0.0.1, port:9099).
#   maestro test --device <ios-udid> apps/ios/.maestro/password-reset.yaml
appId: com.schedulersystems.scheduler
---
- launchApp:
    clearState: true
    arguments:
      useFirebaseEmulator: true
- assertVisible: "Sign in to manage your schedules"   # iOS login screen rendered
- takeScreenshot: 01-login
- tapOn: "Forgot Password?"
- assertVisible: "Reset Password"                      # navigated to the reset screen
- takeScreenshot: 02-reset-screen
- tapOn: "Email"
- inputText: "qa-e2e@example.com"
- tapOn: "Reset Password"            # tap the title (static text) to dismiss the keyboard — hideKeyboard is flaky on iOS sim
- tapOn: "Send Reset Email"
- assertVisible: "Check your email for the reset link" # success state from real VM→service→emulator
- takeScreenshot: 03-reset-success
