# Maestro GUI e2e for the iOS policies page (Flutter→native consolidation).
# login → Home → "Policies" → legal screen lists Privacy Policy + Terms & Conditions
# (both open the external Legal Center; the e2e asserts the screen, does not open the browser).
appId: com.schedulersystems.scheduler
---
- launchApp:
    clearState: true
    arguments:
      useFirebaseEmulator: true
- extendedWaitUntil:
    visible: "Sign in to manage your schedules"
    timeout: 45000
- tapOn: "Email"
- inputText: "qa-verified@example.com"
- tapOn:
    text: "Password"
    index: 0
- inputText: "Password123!"
- tapOn: "Scheduler"
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "My Schedules"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Policies"
    direction: DOWN
    timeout: 15000
- tapOn: "Policies"
- extendedWaitUntil:
    visible: "Privacy Policy"
    timeout: 15000
- assertVisible: "Terms & Conditions"
- takeScreenshot: 01-policies
