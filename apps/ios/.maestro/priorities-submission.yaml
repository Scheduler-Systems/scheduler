# Maestro GUI e2e for the iOS priorities-submission page (Flutter→native consolidation).
# login → My Schedules → QA Demo Schedule → dashboard → "Submit Priorities" → priorities list
# (current_priorities from the Go API) → Submit → "Priorities submitted!".
# Preconditions: Go API :4180 + seed.sh (sets current_priorities on QA Demo Schedule).
appId: com.schedulersystems.scheduler
---
- launchApp:
    clearState: true
    arguments:
      useFirebaseEmulator: true
- extendedWaitUntil:
    visible: "Sign in to manage your schedules"
    timeout: 45000
- tapOn: "Email"
- inputText: "qa-verified@example.com"
- tapOn:
    text: "Password"
    index: 0
- inputText: "Password123!"
- tapOn: "Scheduler"
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "My Schedules"
    timeout: 15000
- tapOn: "My Schedules"
- extendedWaitUntil:
    visible: "QA Demo Schedule"
    timeout: 15000
- tapOn: "QA Demo Schedule"
- extendedWaitUntil:
    visible: "Schedule Name:"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Submit Priorities"
    direction: DOWN
    timeout: 15000
- tapOn: "Submit Priorities"
- extendedWaitUntil:
    visible: "1. Alex Worker"                            # current_priorities seeded on the schedule (Go API)
    timeout: 15000
- tapOn:
    text: "^Submit$"                                     # the Submit button (not the "Submit Priorities" title)
- extendedWaitUntil:
    visible: "Priorities submitted!"                     # persisted via POST /availability
    timeout: 15000
- takeScreenshot: 01-priorities-submission
