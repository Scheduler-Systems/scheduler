# XcodeGen spec — generates SchedulerApp.xcodeproj so the SwiftPM SwiftUI
# sources can be built as a real iOS .app (SwiftPM `.executable` can't).
# Regenerate with: xcodegen generate
name: SchedulerApp
options:
  bundleIdPrefix: com.schedulersystems
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "8.0.0"
targets:
  SchedulerApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/SchedulerApp
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schedulersystems.scheduler
        INFOPLIST_FILE: Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        # Ad-hoc sign the app on the simulator so the keychain entitlement applies
        # (Firebase Auth writes the session to the keychain on sign-in). Overrides the
        # project-level CODE_SIGNING_ALLOWED:NO for the app target only.
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: SchedulerApp.entitlements
  SchedulerAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/SchedulerAppTests
    dependencies:
      - target: SchedulerApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schedulersystems.scheduler.tests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  SchedulerApp:
    build:
      targets:
        SchedulerApp: all
        SchedulerAppTests: [test]
    test:
      targets:
        - SchedulerAppTests
