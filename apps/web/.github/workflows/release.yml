name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: '20'
  FIREBASE_PROJECT: your-firebase-project-id

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run tests
        run: npm test

      - name: Validate web native shell
        run: |
          test -f README.md
          test -f app/index.html
          test -f app/src/scheduleShell.js
          test -f fixtures/mock-schedule.json
          ruby -rjson -e 'JSON.parse(File.read("fixtures/mock-schedule.json"))'
          grep -R "managerMode" app fixtures
          grep -R "workerMode" app fixtures

  create-release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          {
            echo "changelog<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            if [ -n "$LAST_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ github.ref_name }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Scheduler Web ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true

  deploy:
    name: Deploy to Firebase Hosting
    needs: [validate, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true
          token_format: 'access_token'
          access_token_lifetime: '3600s'

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy \
            --only hosting:scheduler-web \
            --project "$FIREBASE_PROJECT" \
            --non-interactive \
            --token "${{ steps.auth.outputs.access_token }}"

      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Project:** $FIREBASE_PROJECT" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** scheduler-web" >> $GITHUB_STEP_SUMMARY
