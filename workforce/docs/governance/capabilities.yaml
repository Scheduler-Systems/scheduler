      - { capability: "message:ceo", scope: "escalate an investor-update synthesis item beyond its scope to the CEO (its manager)", why: "org-chart escalation UP to its manager (internal A2A, report-only)", granted_by: shay, revocable: true }
      - { capability: "post:slack", scope: "#executive-updates", why: "deliver the investor update", granted_by: shay, revocable: true }
      - { capability: "write:github_issue", scope: "ops digest repo (gated: OPS_REPORT_ONLY)", why: "durable record of the update", granted_by: shay, revocable: true }

