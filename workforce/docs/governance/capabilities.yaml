# =============================================================================
# CAPABILITY MANIFEST — the enforced companion to the GAL-run Governance Charter.
#
# Charter backlog item #1, made real: every deployed agent declares exactly which
# AGENT (never human) identities it authenticates as, the capabilities it is granted
# (each with WHY + who granted it), and the ring-fenced funding it may spend from.
#
# This file is MACHINE-CHECKED by `gal capability validate` (the GAL CLI is the enforcing
# authority; scripts/check_capability_coverage.py is the equivalent Python gate, kept in sync):
#   * Rule #1 (never mix identities) — no grant may reference a human-tier identity.
#   * Spend-only, never procure     — no identity/grant may set can_buy; verbs are allow-listed.
#   * Coverage (default-deny)        — every graph in langgraph.json MUST have a grant.
#   * Funding                        — an agent-spendable pool may not auto-recharge unless
#                                      ring-fenced (bounds real-money blast radius).
#
# Booleans MUST be canonical `true`/`false` (never the YAML-1.1 `on`/`off`/`yes`/`no`, which
# Python and Rust parsers disagree on). See gal-run-governance-charter.md + identity-mixing-audit.
# =============================================================================
apiVersion: gal/v1
kind: CapabilityManifest
version: 1

# --- HUMANS (top tier — own/grant/pay/approve; NEVER given to an agent) -------------
owners:
  - id: shay
    tier: human
    role: founder / investor
    note: top of the accountability tree; owns all billing + approval; issues + revokes
          every agent identity below. This identity is never used by an agent or a tool.

# --- AGENT IDENTITIES (NHI) — scoped machine credentials issued by a human ----------
# Each is spend-only at most (can_buy: false everywhere). No agent identity carries
# ownership, billing, payment, or approval authority.
identities:
  model_inference:
    tier: agent
    kind: inference_api_subkey
    can_buy: false
    issued_by: shay
    spends_from: ring_fenced_pool
    note: DeepSeek / Gemini inference keys. Spend-only — spends a balance, cannot top it up.
  github_app:
    tier: agent
    kind: github_app_installation
    can_buy: false
    issued_by: shay
    env: FLEET_APP_ID
    note: permission-scoped GitHub App; no billing/admin. GitHub writes gated by OPS_REPORT_ONLY.
  openclaw_slack_bot:
    tier: agent
    kind: slack_bot_token
    can_buy: false
    issued_by: shay
    secret_ref: secret-store (REMEDIATION PENDING — currently plaintext ~/.openclaw/openclaw.json)
    shared: true
    note: one shared bot (posts as "OpenClaw"). FLAGGED — not per-agent isolated; see audit item 3.
  revenuecat_api_key:
    tier: agent
    kind: rest_api_key
    can_buy: false
    issued_by: shay
    note: read-mostly RevenueCat key (priority-118da Secret Manager). No plan/billing changes.
  langsmith_api_key:
    tier: agent
    kind: rest_api_key
    can_buy: false
    issued_by: shay
    note: >-
      READ-ONLY LangSmith key for the AI/Platform Specialist (Lennox). Reads runs / feedback /
      crons / deployment revisions ONLY — it NEVER deploys, never creates a cron, never mutates
      config or project settings. The deploy/config levers stay human-gated (the same scoped key
      the read paths use; the deploy-scoped key is a SEPARATE founder-held credential, never wired
      into this agent). An ACTIVATION GATE injected at deploy time (LangSmith runtime secret) —
      absent in CI, so Lennox runs honestly report-only with everything "unverifiable".
  asc_api_key:
    tier: agent
    kind: app_store_connect_key
    can_buy: false
    issued_by: shay
    note: App Store Connect ES256 key (key id D8U78K3S79). Reads store/sub state; writes GATED.
  play_sa:
    tier: agent
    kind: google_service_account
    can_buy: false
    issued_by: shay
    note: Google Play Developer SA. Reads store/sub state; writes GATED.
  brevo_api_key:
    tier: agent
    kind: rest_api_key
    can_buy: false
    issued_by: shay
    note: Brevo (email/CRM) read + DRAFT only — never sends on the agent's own authority.
  gmail_oauth:
    tier: agent
    kind: gmail_oauth_token
    can_buy: false
    issued_by: shay
    env: GMAIL_OAUTH_TOKEN
    note: >-
      Gmail read + DRAFT-compose only (no gmail.send scope ever requested). Powers the email-triage
      agent (Posey). The token is an ACTIVATION GATE injected at deploy time (LangSmith runtime
      secret) — absent in CI, so the agent runs honestly report-only. Cannot send mail.

# --- FUNDING (the money end of spend-only) ------------------------------------------
# An inference key is only "spend-only" if its funding cannot auto-procure. This is the
# top open governance gap (founder action — see identity-mixing-audit table C).
funding:
  ring_fenced_pool:
    purpose: the single capped pool every agent's model spend draws from
    ring_fenced: pending          # FOUNDER ACTION — provision a prepaid/capped instrument
    auto_recharge: false          # MUST stay false; the gate FAILS if this is ever turned on (canonical bool — never the YAML-1.1 `off`)
    max_usd_exposure: null        # FOUNDER sets the hard cap (USD)
    separate_from_main_card: required
    note: HARD GATE. Until ring_fenced, exposure is bounded only by provider settings.

# --- CAPABILITY GRANTS — one per deployed graph (default-deny) -----------------------
