# =============================================================================
# Agent roster — the org chart + payroll + HR record for the deployed agent workforce.
# Each agent is an "employee": a salary (token budget), a shift (schedule), a grade
# (model tier), a status, and a performance scorecard.
#
# Ordered REVENUE-FIRST (per Shay): GROWTH agents (the revenue generators) lead, then QA
# (quality enablement — QA makes the product good; it does not itself generate revenue),
# then OPS (keep-the-lights-on), then HR/management. The daily_digest renders the fleet in
# this same order (revenue leads) and tracks staffed-vs-~81 autonomy coverage day over day.
#
# Edit the numbers — these are STARTING DEFAULTS. TBD = needs your decision.
# Schedgy will eventually roster these inside the Scheduler app; today the "shifts"
# are plain cron/event triggers.
# =============================================================================

policy:
  budget_period: weekly                 # weekly | monthly
  team_token_budget: 6460000            # WHOLE fleet = sum(agents: salaries) (= board 0.34M + exec 0.72M + growth 1.25M + qa 2.5M + ops 0.90M + platform 0.15M + onboarded-no-org-group 0.60M). MUST equal sum(agents salaries) — reconciled by tests/test_roster_no_ghosts.py::PayrollBudgetReconciled so any hire/fire re-balances the cap. The CFO proposes the authoritative re-balance for Shay's ratification. (board +0.08M: board_pr_review hire)
  per_run_token_ceiling: 150000         # hard kill-switch: max tokens a single agent run may spend (bumped 50k→150k on Shay's call 2026-06-06: deepagents runtimes legitimately need >50k/run — cfo_deepagents tripped it at 51,075; still a real per-run cap, team_token_budget remains the spend ceiling)
  shift_minutes: 5                      # length of one work shift — start SMALL; bounded by time AND token salary (whichever first)
  global_kill_switch_env: AGENTS_DISABLED  # set this env var truthy to stop ALL agents immediately

  # Hiring source = the open roles from the workspace audit (the "job board").
  job_board: docs/audit/catalog.json    # ~81 processes = unstaffed roles to hire into

  # Hire (deploy a new agent) and fire (decommission one) are CONSEQUENTIAL:
  # the HR-manager PROPOSES, a human APPROVES. No silent hiring/firing.
  hire_fire_requires_approval: true

  # New hires run report-only / propose-only until they prove out, then earn write authority.
  probation: report_only_until_2_clean_reviews

  # A worker "doesn't work well" (fire-able) if it trips these over a review window:
  review_window: 2_weeks
  firing_criteria:
    max_error_rate: 0.05                # > 5% of runs error out
    max_false_positive_rate: 0.15       # flags that were wrong / drafts you rejected
    max_cost_per_useful_action: 50000   # tokens per real useful action (review if exceeded)
    min_useful_actions_per_period: 1    # too idle / never produces anything = redundant

org:
  hr_ops_manager: "runs payroll + scheduling + performance reviews; proposes hire/fire (approval-gated)"
  team_lead: qa_lead_aggregator
  # Org TOP-DOWN: board (oversight → investor update) → executive (C-suite) → departments
  # (growth/qa/ops) → hr. daily_digest reads these groups; the board investor-update leads.
  board:                 # OVERSIGHT — produces THE investor update to Shay (founder/investor)
    - board_chair
    - audit_risk_director
    - growth_director
  executive:             # C-SUITE — propose-only monitoring over their domains; the CEO chairs
    - ceo
    - cfo
    - coo
    - cto
    - cmo
    - security_officer     # CISO (Lior) — operational security, peer of CTO, reports to CEO
    - clo                  # CLO (Lex) — legal surface, reports to CEO
  growth:                # REVENUE generators — first-class. Propose-only drafts; human gates anything live.
    - conversion_growth_analyst
    - aso_store_listing_agent
    - content_campaign_drafter
  qa:                    # QUALITY enablement — makes the product good; not itself revenue.
    - qa_lead_aggregator
    - web_automation_engineer
    - android_automation_engineer
    - ios_automation_engineer
    - web_manual_tester
    - android_manual_tester
    - ios_manual_tester
  ops:                   # keep-the-lights-on (DEPLOYED LangSmith graphs only)
    # LOCAL-ONLY agents are intentionally ABSENT from org.ops + agents:. git_sync_auditor (Sage)
    # and memory_sync (Remy) are LOCAL launchd workers (graphs/ops/{git_sync_auditor,memory_sync}.py
    # — NOT in langgraph.json, dead under macOS TCC). They are NOT deployed graphs, so they are NOT
    # employees here and NOT in any org: routing list: dept_of(them) is None and they can never be a
    # delegation target. Removed 2026-06-07 to kill the "ghost employee" confusion (a rostered name
    # with no deployed graph). If either is ever promoted to a deployed graph, HIRE it through HR
    # (langgraph.json + capabilities.yaml grant + agents: row + org: list). See
    # docs/ops-fleet/local-only-agents.md.
    - revenue_reporter
    - store_health_checker
    - email_triage
    - daily_digest
  platform:              # owns + maintains the LangSmith RUNTIME itself (managed by the CTO)
    - platform_specialist

# Per-agent record. salary = token budget per `policy.budget_period`.
